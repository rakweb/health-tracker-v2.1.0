<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Health Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="app-version" content="2.1.1">

  <!-- ✅ Theme bootstrap -->
  <script>
    (function () {
      const saved = localStorage.getItem('HT_THEME');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/theme-dark.css">
  <link rel="stylesheet" href="./css/theme-light.css">
  <link rel="stylesheet" href="./css/range-slider.css">

  <!-- ✅ PWA -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon-192.png">

  <!-- ✅ Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>

  <!-- ✅ DB (LOAD BEFORE APP) -->
  <script src="./js/db.js" defer></script>

  <!-- ✅ App -->
  <script src="./js/range-slider.js" defer></script>
  <script src="./js/app.js" defer></script>
</head>

<body>

<header>
  <h1>Health Tracker</h1>
  <div id="appVersion"></div>
</header>

<main>
  <!-- ✅ Your full UI remains exactly as before -->
</main>

<!-- ✅ UPDATE TOAST -->
<div id="updateToast" class="toast" style="display:none">
  <span>New version available.</span>
  <button id="btnReloadNow">Reload now</button>
  <button id="btnDismissToast">Later</button>
</div>

<!-- ✅ SERVICE WORKER (CLEAN + SAFE) -->
<script>
if ('serviceWorker' in navigator) {

  let updating = false;

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(() => console.log('✅ Service Worker Registered'))
      .catch(err => console.log('❌ SW failed:', err));
  });

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (updating) return;
    updating = true;

    console.log('✅ SW updated');

    const toast = document.getElementById('updateToast');
    if (toast) toast.style.display = 'block';
  });
}
</script>

<!-- ✅ RELOAD BUTTON -->
<script>
document.getElementById('btnReloadNow')?.addEventListener('click', () => {
  window.location.reload();
});

document.getElementById('btnDismissToast')?.addEventListener('click', () => {
  document.getElementById('updateToast').style.display = 'none';
});
</script>

<!-- ✅ INSTALL PWA FIX -->
<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  const btn = document.getElementById('btnInstall');
  if (btn) btn.style.display = 'inline-block';
});

document.getElementById('btnInstall')?.addEventListener('click', async () => {
  if (!deferredPrompt) return;

  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
});
</script>

<!-- ✅ VERSION DISPLAY -->
<script>
window.addEventListener('load', () => {
  const meta = document.querySelector('meta[name="app-version"]');
  const el = document.getElementById('appVersion');
  if (meta && el) {
    el.textContent = "Version " + meta.content;
  }
});
</script>

</body>
</html>
